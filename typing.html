    /* ════════════════════════════════════════════════════════════════
       AUDIO — Web Audio API mechanical click
    ════════════════════════════════════════════════════════════════ */
    let _audioCtx = null;
    function getAudioCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return _audioCtx;
    }
    function playClick() {
      try {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') ctx.resume();
        const sr  = ctx.sampleRate;
        const now = ctx.currentTime;

        // ── Layer 1: 노이즈 클릭 본체 ──────────────────────────────
        // 극도로 짧은 감쇠(2ms 시정수)로 "탁"의 어택감 생성
        const nLen = Math.floor(sr * 0.020); // 20ms 버퍼
        const nBuf = ctx.createBuffer(1, nLen, sr);
        const nDat = nBuf.getChannelData(0);
        for (let i = 0; i < nLen; i++) {
          nDat[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.002));
        }
        const nSrc = ctx.createBufferSource();
        nSrc.buffer = nBuf;

        // 2500–5000 Hz 대역 강조 → 키보드 특유의 고음 클릭
        const hpf = ctx.createBiquadFilter();
        hpf.type = 'highpass'; hpf.frequency.value = 2500;

        const nGain = ctx.createGain();
        nGain.gain.setValueAtTime(1.1, now);
        nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.018);

        nSrc.connect(hpf); hpf.connect(nGain); nGain.connect(ctx.destination);
        nSrc.start(now);

        // ── Layer 2: pitch blip ────────────────────────────────────
        // 짧은 피치 다운 글라이드 → "탁"의 바디감(톤)
        const osc = ctx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(900, now);
        osc.frequency.exponentialRampToValueAtTime(140, now + 0.014);

        const oGain = ctx.createGain();
        oGain.gain.setValueAtTime(0.30, now);
        oGain.gain.exponentialRampToValueAtTime(0.001, now + 0.014);

        osc.connect(oGain); oGain.connect(ctx.destination);
        osc.start(now); osc.stop(now + 0.015);
      } catch (_) {}
    }

    /* ════════════════════════════════════════════════════════════════
       RANKING  — localStorage
    ════════════════════════════════════════════════════════════════ */
    const LS_KEY = 'typing_v3_rankings';
    function loadRecords() {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
      catch { return []; }
    }
    function saveRecord(rec) {
      const all = loadRecords();
      all.push({ ...rec, id: Date.now(), ts: Date.now() });
      if (all.length > 300) all.splice(0, all.length - 300);
      localStorage.setItem(LS_KEY, JSON.stringify(all));
    }
    function fmtDate(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function startOfDay(ts)  { const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
    function startOfWeek(ts) { const d = new Date(ts); d.setHours(0,0,0,0); d.setDate(d.getDate()-d.getDay()); return d.getTime(); }

    function Char({ ch, status, t }) {
      const display = ch === ' ' ? '\u00A0' : ch;
      const cls = {
        correct:  t.charCorrect,
        wrong:    t.charWrong,
        current:  t.charCurrent,
        upcoming: t.charUpcoming,
      }[status];
      return (
        <span className={`inline-block font-medium leading-relaxed transition-colors duration-75 ${cls}`}>
          {display}
        </span>
      );
    }

    function StatCard({ label, value, t, hi }) {
      return (
        <div className={`${t.card} rounded-2xl px-4 py-5 flex flex-col items-center gap-1 fade-in`}>
          <span className={`text-3xl font-bold ${hi ? t.accent : t.text}`}>{value}</span>
          <span className={`text-xs ${t.textSub} tracking-wide`}>{label}</span>
        </div>
      );
    }

    function IconBtn({ onClick, title, children, t }) {
      return (
        <button onClick={onClick} title={title}
          className={`${t.iconBtn} p-2 rounded-xl transition-colors`}>
          {children}
        </button>
      );

    function RankingPage({ t, onBack }) {
      const [period, setPeriod] = useState('all');
      const [lang,   setLang]   = useState('all');
      const [diff,   setDiff]   = useState('all');
      const [records, setRecords] = useState(loadRecords);

      const now = Date.now();
      const filtered = useMemo(() => {
        return records
          .filter(r => {
            if (period === 'today') return r.ts >= startOfDay(now);
            if (period === 'week')  return r.ts >= startOfWeek(now);
            return true;
          })
          .filter(r => lang === 'all' || r.lang === lang)
          .filter(r => diff === 'all' || r.difficulty === diff)
          .sort((a, b) => b.cpm - a.cpm)
          .slice(0, 50);
      }, [records, period, lang, diff]);

      const BtnGroup = ({ options, value, onChange, extra }) => (
        <div className={`flex gap-1 ${t.tabBg} rounded-xl p-1 ${extra || ''}`}>
          {options.map(([v, label]) => (
            <button key={v} onClick={() => onChange(v)}
              className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all
                ${value === v ? t.periodActive : t.periodInactive}`}>
              {label}
            </button>
          ))}
        </div>
      );

      return (
        <div className={`min-h-screen ${t.page} flex flex-col`}>
          <div className={`${t.header} px-6 py-4`}>
            <div className="max-w-3xl mx-auto flex items-center gap-3">
              <button onClick={onBack} className={`${t.iconBtn} p-1.5 rounded-lg transition-colors`}>
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
              </button>
              <span className={`font-bold text-lg ${t.text}`}>랭킹</span>
              <span className={`ml-auto text-xs ${t.textMuted}`}>{records.length}개 기록</span>
            </div>
          </div>

          <div className="max-w-3xl mx-auto w-full px-6 py-6 flex flex-col gap-4">
            {/* 필터 */}
            <div className="flex flex-wrap gap-2 items-center">
              <BtnGroup
                options={[['all','전체'],['today','오늘'],['week','이번주']]}
                value={period} onChange={setPeriod}
              />
              <BtnGroup
                options={[['all','모든 언어'],['ko','한국어'],['en','English']]}
                value={lang} onChange={setLang}
              />
              <BtnGroup
                options={[['all','전체 난이도'],['easy','하'],['medium','중'],['hard','상']]}
                value={diff} onChange={setDiff}
              />
            </div>

            {/* 테이블 */}
            <div className={`${t.card} rounded-2xl overflow-hidden`}>
              <div className={`grid grid-cols-12 px-5 py-3 text-xs font-bold uppercase tracking-wider
                ${t.rankHeader} border-b ${t.divider}`}>
                <span className="col-span-1">#</span>
                <span className="col-span-3">타수/분</span>
                <span className="col-span-2">WPM</span>
                <span className="col-span-2">정확도</span>
                <span className="col-span-1">레벨</span>
                <span className="col-span-1">언어</span>
                <span className="col-span-2 text-right">날짜</span>
              </div>

              {filtered.length === 0 ? (
                <div className={`px-5 py-14 text-center ${t.textMuted} text-sm`}>
                  아직 기록이 없어요. 타자 연습을 완주해보세요!
                </div>
              ) : filtered.map((r, i) => (
                <div key={r.id}
                  className={`grid grid-cols-12 px-5 py-3.5 border-b last:border-b-0
                    ${t.divider} ${t.rankRow} transition-colors text-sm`}>
                  <span className={`col-span-1 font-bold ${i < 3 ? t.accent : t.textSub}`}>
                    {i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}
                  </span>
                  <span className={`col-span-3 font-bold ${t.text}`}>
                    {r.cpm} <span className={`text-xs font-normal ${t.textSub}`}>CPM</span>
                  </span>
                  <span className={`col-span-2 ${t.text}`}>{r.wpm}</span>
                  <span className={`col-span-2 ${r.accuracy >= 95 ? t.accent : t.text}`}>{r.accuracy}%</span>
                  <span className={`col-span-1 ${t.textSub}`}>{DIFF_LABEL[r.difficulty] || r.difficulty}</span>
                  <span className={`col-span-1 ${t.textSub}`}>{r.lang === 'ko' ? '한' : 'EN'}</span>
                  <span className={`col-span-2 text-right ${t.textMuted} text-xs`}>{fmtDate(r.ts)}</span>
                </div>
              ))}
            </div>

            {records.length > 0 && (
              <button
                onClick={() => { localStorage.removeItem(LS_KEY); setRecords([]); }}
                className={`self-end text-xs ${t.btnDanger} transition-colors`}>
                모든 기록 초기화
              </button>
            )}
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════════════════════════
       COMPLETED SCREEN
    ════════════════════════════════════════════════════════════════ */
    function CompletedScreen({ cpm, wpm, accuracy, t, onRestart, onRanking }) {
      const stats = [
        { label: '타수/분', value: cpm, sub: 'CPM' },
        { label: 'WPM', value: wpm, sub: '' },
        { label: '정확도', value: accuracy + '%', sub: '' },
      ];
      return (
        <div className={`min-h-screen ${t.page} flex items-center justify-center p-6`}>
          <div className={`${t.card} rounded-3xl p-10 max-w-md w-full text-center fade-in`}>
            <div className={`w-16 h-16 ${t.accentSoft} rounded-full flex items-center justify-center mx-auto mb-5`}>
              <svg className={`w-8 h-8 ${t.accent}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
            <h2 className={`text-2xl font-bold ${t.text} mb-1`}>완주했습니다!</h2>
            <p className={`${t.textSub} text-sm mb-8`}>모든 문장을 완료했어요</p>

            <div className="grid grid-cols-3 gap-3 mb-8">
              {stats.map(({ label, value, sub }) => (
                <div key={label} className={`${t.accentSoft} rounded-2xl p-4`}>
                  <div className={`text-2xl font-bold ${t.accent}`}>{value}</div>
                  <div className={`text-xs ${t.textSub} mt-1`}>{label}{sub && ` (${sub})`}</div>
                </div>
              ))}
            </div>

            <div className="flex gap-3">
              <button onClick={onRanking}
                className={`flex-1 ${t.btnOutline} rounded-2xl py-3 text-sm font-semibold transition-colors`}>
                랭킹 보기
              </button>
              <button onClick={onRestart}
                className={`flex-1 ${t.accentBg} text-white rounded-2xl py-3 text-sm font-semibold transition-colors`}>
                다시 시작
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════════════════════════
       MAIN APP
    ════════════════════════════════════════════════════════════════ */
    function App() {
      /* nav */
      const [page,       setPage]       = useState('typing');
      /* settings */
      const [lang,       setLang]       = useState('ko');
      const [difficulty, setDifficulty] = useState('medium');
      const [theme,      setTheme]      = useState('light');
      const [soundOn,    setSoundOn]    = useState(true);
      /* game */
      const [gameState,  setGameState]  = useState('idle'); // idle|playing|paused|completed
      const [idx,        setIdx]        = useState(0);
      const [input,      setInput]      = useState('');
      const [composing,  setComposing]  = useState(false);
      const [startTime,  setStartTime]  = useState(null);
      const [pausedMs,   setPausedMs]   = useState(0);
      const [elapsed,    setElapsed]    = useState(0);
      const [session,    setSession]    = useState({ correct: 0, typed: 0 });

      const inputRef = useRef(null);
      const timerRef = useRef(null);
      const t = TH[theme];
      const sentences = SENTENCES[lang][difficulty];
      const sentence  = sentences[idx];

      /* timer */
      useEffect(() => {
        if (gameState === 'playing' && startTime) {
          timerRef.current = setInterval(
            () => setElapsed(pausedMs + (Date.now() - startTime)), 200
          );
        } else {
          clearInterval(timerRef.current);
        }
        return () => clearInterval(timerRef.current);
      }, [gameState, startTime, pausedMs]);

      /* reset when lang or difficulty changes */
      useEffect(() => { doReset(); }, [lang, difficulty]);

      /* focus input when playing */
      useEffect(() => {
        if (gameState === 'playing') inputRef.current?.focus();
      }, [gameState, idx]);

      /* ── derived stats ── */
      const inputCorrect = input.split('').filter((ch, i) => ch === sentence[i]).length;
      const totCorrect   = session.correct + inputCorrect;
      const totTyped     = session.typed   + input.length;
      const elapsedMin   = elapsed / 60000;
      const cpm          = elapsedMin > 0.05 ? Math.round(totCorrect / elapsedMin) : 0;
      const wpm          = Math.round(cpm / 3.5);
      const accuracy     = totTyped > 0 ? Math.round((totCorrect / totTyped) * 100) : 100;
      const progress     = Math.min(100,
        Math.round(((idx + input.length / Math.max(sentence.length, 1)) / sentences.length) * 100)
      );

      const charStatuses = sentence.split('').map((_, i) => {
        if (i < input.length) return input[i] === sentence[i] ? 'correct' : 'wrong';
        if (i === input.length) return 'current';
        return 'upcoming';
      });

      /* ── actions ── */
      function doStart() {
        setStartTime(Date.now());
        setGameState('playing');
      }
      function doPause() {
        setPausedMs(elapsed);
        setStartTime(null);
        setGameState('paused');
      }
      function doReset() {
        clearInterval(timerRef.current);
        setGameState('idle');
        setIdx(0);
        setInput('');
        setStartTime(null);
        setPausedMs(0);
        setElapsed(0);
        setSession({ correct: 0, typed: 0 });
      }
      function doAdvance() {
        const correct = input.split('').filter((ch, i) => ch === sentence[i]).length;
        const newSess = { correct: session.correct + correct, typed: session.typed + input.length };
        if (idx + 1 >= sentences.length) {
          clearInterval(timerRef.current);
          const mins   = elapsed / 60000;
          const fCpm   = mins > 0.05 ? Math.round(newSess.correct / mins) : 0;
          const fWpm   = Math.round(fCpm / 3.5);
          const fAcc   = newSess.typed > 0 ? Math.round((newSess.correct / newSess.typed) * 100) : 100;
          saveRecord({ lang, difficulty, cpm: fCpm, wpm: fWpm, accuracy: fAcc });
          setSession(newSess);
          setGameState('completed');
        } else {
          setSession(newSess);
          setIdx(i => i + 1);
          setInput('');
        }
      }

      function handleChange(e) {
        if (gameState !== 'playing') return;
        const val = e.target.value;
        if (!composing && val.length > sentence.length) return;
        setInput(val);
      }
      function handleKeyDown(e) {
        if (gameState !== 'playing') return;
        // 영어: 조합 중이 아닐 때만 keydown으로 발음
        // 한국어 IME 조합 중에는 e.key === 'Process' 이므로 여기선 무시
        if (soundOn && !composing && e.key.length === 1 && !e.ctrlKey && !e.metaKey) playClick();
        if (e.key === 'Enter' && !composing) { e.preventDefault(); doAdvance(); }
      }
      // 한국어 자모 1타마다 compositionupdate 발생 → 여기서 소리
      function handleCompositionUpdate() {
        if (soundOn && gameState === 'playing') playClick();
      }

      /* ── completed ── */
      if (gameState === 'completed') {
        const mins = elapsed / 60000;
        const fCpm = mins > 0.05 ? Math.round(session.correct / mins) : 0;
        return (
          <CompletedScreen
            cpm={fCpm} wpm={Math.round(fCpm / 3.5)}
            accuracy={session.typed > 0 ? Math.round((session.correct / session.typed) * 100) : 100}
            t={t} onRestart={doReset} onRanking={() => setPage('ranking')}
          />
        );
      }

      /* ── ranking page ── */
      if (page === 'ranking') return <RankingPage t={t} onBack={() => setPage('typing')} />;

      /* ════════════ TYPING PAGE ════════════ */
      return (
        <div className={`min-h-screen ${t.page} flex flex-col`}>

          {/* ── HEADER ── */}
          <header className={t.header}>
            <div className="max-w-3xl mx-auto px-6 py-3.5 flex items-center gap-3 flex-wrap">
              {/* logo */}
              <div className={`w-8 h-8 ${t.accentBg} text-white rounded-xl flex items-center justify-center flex-shrink-0`}>
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                  <path strokeLinecap="round" strokeLinejoin="round"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5
                       m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </div>
              <span className={`font-bold text-lg ${t.text}`}>타자 연습</span>

              {/* lang tabs */}
              <div className={`flex gap-1 ${t.tabBg} rounded-xl p-1 ml-2`}>
                {[['ko','한국어'],['en','English']].map(([v,lbl]) => (
                  <button key={v} onClick={() => setLang(v)}
                    className={`px-3 py-1.5 rounded-lg text-sm font-semibold transition-all
                      ${lang === v ? t.tabActive : t.tabInactive}`}>
                    {lbl}
                  </button>
                ))}
              </div>

              <div className="flex-1" />

              {/* sound */}
              <IconBtn onClick={() => setSoundOn(s => !s)} title="효과음" t={t}>
                {soundOn
                  ? <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round"
                        d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
                    </svg>
                  : <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round"
                        d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6m0-6l6 6"/>
                    </svg>
                }
              </IconBtn>

              {/* theme */}
              <IconBtn onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')} title="테마" t={t}>
                {theme === 'light'
                  ? <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                  : <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707
                           M6.343 6.343l-.707-.707m12.728 0l-.707.707
                           M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                }
              </IconBtn>

              {/* ranking */}
              <IconBtn onClick={() => setPage('ranking')} title="랭킹" t={t}>
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                  <path strokeLinecap="round" strokeLinejoin="round"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2
                       a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14
                       a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
              </IconBtn>
            </div>
          </header>

          {/* ── MAIN ── */}
          <main className="flex-1 max-w-3xl mx-auto w-full px-6 py-6 flex flex-col gap-4">

            {/* ── 난이도 + 컨트롤 ── */}
            <div className="flex items-center gap-3 flex-wrap">
              {/* difficulty */}
              <div className="flex items-center gap-2">
                <span className={`text-xs font-semibold ${t.textSub} shrink-0`}>난이도</span>
                <div className={`flex gap-1 ${t.tabBg} rounded-xl p-1`}>
                  {[['easy','하'],['medium','중'],['hard','상']].map(([v,lbl]) => (
                    <button key={v} onClick={() => setDifficulty(v)}
                      className={`px-3 py-1.5 rounded-lg text-sm font-bold transition-all
                        ${difficulty === v ? t.diffActive : t.diffInactive}`}>
                      {lbl}
                    </button>
                  ))}
                </div>
              </div>

              <div className="flex-1" />

              {/* control buttons */}
              <div className="flex gap-2 items-center">
                {gameState === 'idle' && (
                  <button onClick={doStart}
                    className={`${t.accentBg} text-white px-5 py-2 rounded-xl text-sm font-bold
                      transition-all flex items-center gap-2`}>
                    <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                      <path fillRule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832
                           l3-2a1 1 0 000-1.664l-3-2z" clipRule="evenodd"/>
                    </svg>
                    시작
                  </button>
                )}
                {gameState === 'playing' && (
                  <button onClick={doPause}
                    className={`${t.btnOutline} px-5 py-2 rounded-xl text-sm font-bold
                      transition-all flex items-center gap-2`}>
                    <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                      <path fillRule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0
                           00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd"/>
                    </svg>
                    일시중단
                  </button>
                )}
                {gameState === 'paused' && (
                  <button onClick={doStart}
                    className={`${t.accentBg} text-white px-5 py-2 rounded-xl text-sm font-bold
                      transition-all flex items-center gap-2`}>
                    <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                      <path fillRule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832
                           l3-2a1 1 0 000-1.664l-3-2z" clipRule="evenodd"/>
                    </svg>
                    재개
                  </button>
                )}
                {gameState !== 'idle' && (
                  <button onClick={doReset} title="초기화"
                    className={`${t.iconBtn} p-2.5 rounded-xl transition-colors`}>
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                      <path strokeLinecap="round" strokeLinejoin="round"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003
                           8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                  </button>
                )}
              </div>
            </div>

            {/* ── STATS ── */}
            <div className="grid grid-cols-3 gap-3">
              <StatCard label="타수/분 (CPM)" value={cpm} t={t} />
              <StatCard label="정확도" value={accuracy + '%'} t={t} hi={accuracy >= 95} />
              <StatCard label="WPM" value={wpm} t={t} />
            </div>

            {/* ── PROGRESS ── */}
            <div className={`${t.card} rounded-2xl px-6 py-4`}>
              <div className="flex justify-between text-xs mb-2.5">
                <span className={`font-semibold ${t.textSub}`}>진행도</span>
                <span className={`font-bold ${t.accent}`}>{idx + 1} / {sentences.length}</span>
              </div>
              <div className={`w-full ${t.progressBg} rounded-full h-2 overflow-hidden`}>
                <div className={`${t.accentBar} h-2 rounded-full transition-all duration-500`}
                  style={{ width: Math.max(progress, 1) + '%' }} />
              </div>
            </div>

            {/* ── TYPING PANEL ── */}
            <div className={`${t.card} rounded-2xl px-8 py-7 flex flex-col gap-5 relative overflow-hidden`}>

              {/* badge */}
              <div className="flex items-center gap-2">
                <span className={`text-xs font-bold px-3 py-1 rounded-full ${t.accentSoft}`}>
                  {LANG_LABEL[lang]} · 난이도 {DIFF_LABEL[difficulty]}
                </span>
                <span className={`text-xs ${t.textMuted}`}>Enter → 다음 문장</span>
              </div>

              {/* target sentence */}
              <div
                className="text-[1.55rem] tracking-wide leading-loose select-none min-h-[4rem]
                  flex flex-wrap items-baseline cursor-text"
                onClick={() => gameState === 'playing' && inputRef.current?.focus()}
              >
                {sentence.split('').map((ch, i) => (
                  <Char key={i} ch={ch} status={charStatuses[i]} t={t} />
                ))}
              </div>

              <div className={`border-t ${t.divider}`} />

              {/* input */}
              <div className="relative">
                <textarea
                  ref={inputRef}
                  value={input}
                  onChange={handleChange}
                  onKeyDown={handleKeyDown}
                  onCompositionStart={() => setComposing(true)}
                  onCompositionUpdate={handleCompositionUpdate}
                  onCompositionEnd={e => {
                    setComposing(false);
                    if (e.target.value.length > sentence.length) setInput(sentence);
                  }}
                  rows={2}
                  disabled={gameState !== 'playing'}
                  placeholder={
                    gameState === 'idle'   ? '시작 버튼을 눌러주세요...' :
                    gameState === 'paused' ? '일시중단됨...' :
                    '여기에 입력하세요...'
                  }
                  className={`w-full resize-none rounded-xl border-2 outline-none px-5 py-4
                    text-xl leading-relaxed transition-colors duration-200
                    disabled:opacity-40 disabled:cursor-not-allowed ${t.inputField}`}
                  spellCheck={false} autoComplete="off" autoCorrect="off" autoCapitalize="off"
                />
                <span className={`absolute right-4 bottom-3 text-xs ${t.textMuted} select-none`}>
                  {input.length} / {sentence.length}
                </span>
              </div>

              {/* typo warning */}
              {gameState === 'playing' && input.length > 0 && inputCorrect < input.length && (
                <div className="flex items-center gap-2 text-sm text-red-400 fade-in">
                  <svg className="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round"
                      d="M12 9v2m0 4h.01M12 3a9 9 0 100 18 9 9 0 000-18z"/>
                  </svg>
                  오타가 있어요.
                </div>
              )}

              {/* ── PAUSE OVERLAY ── */}
              {(gameState === 'paused' || gameState === 'idle') && (
                <div className={`absolute inset-0 rounded-2xl ${t.pauseOverlay}
                  flex flex-col items-center justify-center gap-4 z-10`}>
                  <div className={`w-14 h-14 ${t.card} rounded-2xl flex items-center justify-center shadow-lg`}>
                    {gameState === 'idle'
                      ? <svg className={`w-7 h-7 ${t.accent}`} fill="currentColor" viewBox="0 0 20 20">
                          <path fillRule="evenodd"
                            d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0
                               001.555.832l3-2a1 1 0 000-1.664l-3-2z" clipRule="evenodd"/>
                        </svg>
                      : <svg className={`w-7 h-7 ${t.accent}`} fill="currentColor" viewBox="0 0 20 20">
                          <path fillRule="evenodd"
                            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1
                               1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clipRule="evenodd"/>
                        </svg>
                    }
                  </div>
                  <p className={`${t.text} font-bold text-lg`}>
                    {gameState === 'idle' ? '준비됐나요?' : '일시중단'}
                  </p>
                  <button onClick={doStart}
                    className={`${t.accentBg} text-white px-8 py-3 rounded-2xl font-bold text-sm
                      transition-colors flex items-center gap-2`}>
                    <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                      <path fillRule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0
                           001.555.832l3-2a1 1 0 000-1.664l-3-2z" clipRule="evenodd"/>
                    </svg>
                    {gameState === 'idle' ? '시작하기' : '재개하기'}
                  </button>
                  {gameState === 'idle' && (
                    <p className={`text-xs ${t.textMuted}`}>타이머가 시작됩니다</p>
                  )}
                </div>
              )}
            </div>

          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
